spring:
  datasource:
    url: jdbc:h2:file:./.data/quant_local;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect

trading:
  okx-live-enabled: true
  require-user-confirm: true
  emergency-stop: false
